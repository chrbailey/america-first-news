function classifyStory(title, snippet) {
  const text = (title + " " + (snippet || "")).toLowerCase();
  for (const t of TOPICS) {
    if (t.keywords.some(k => text.includes(k))) return t;
  }
  return { tag: "America First News", keywords: [], icon: "📰" };
}

// ── ANALYSIS ENGINE (templated, keyword-driven) ──
function generateRelevance(title, snippet, topic) {
  const text = (title + " " + (snippet || "")).toLowerCase();
  const u = USER;
  const parts = [];

  // Location hooks
  if (text.includes("scottsdale")) parts.push(`${u.name}, this directly affects your ${u.street} neighborhood in ${u.city}.`);
  else if (text.includes("paradise valley")) parts.push(`${u.name}, this is happening in your backyard — Paradise Valley matters to you.`);
  else if (["phoenix", "arizona", "paradevil valley"].some(c => text.includes(c)))
    parts.push(`${u.name}, this affects the entire ${u.region} area where you live and work.`);
  else parts.push(`${u.name}, here's how this connects to your life in ${u.city}.`);

  // Topic-specific hooks
  if (topic.tag.includes("Trump") || topic.tag.includes("MAGA") || topic.tag.includes("Conservative"))
    parts.push(`As someone who supports ${u.causes}, this story directly connects to your core values and the vision for the country you want to see.`);
  else if (topic.tag.includes("Real Estate") || topic.tag.includes("Housing"))
    parts.push(`With your background in ${u.industry} and your expertise in ${u.region}, real estate policy hits directly at your livelihood and investment portfolio. These market forces shape your business.`);
  else if (topic.tag.includes("RV") || topic.tag.includes("Motorhome"))
    parts.push(`As someone who loves ${u.hobby}, this story connects directly to your lifestyle. RV living and motorhome culture are personal passions for you.`);
  else if (topic.tag.includes("Sports Cards"))
    parts.push(`With your interest in ${u.hobby}, sports card grading and market trends matter deeply. This is both a hobby and an investment area you follow closely.`);
  else if (topic.tag.includes("Education") || topic.tag.includes("Internship"))
    parts.push(`As an ${u.school} graduate, education and internship opportunities resonate with you, especially in Arizona. Supporting the next generation of students matters to you.`);
  else if (topic.tag.includes("Health"))
    parts.push(`This connects to your family's interests. With your awareness of ${u.causes} and health policy, these stories inform your worldview and values.`);
  else if (topic.tag.includes("Arizona"))
    parts.push(`From your vantage point as a ${u.city} resident and ${u.school} graduate, Arizona politics directly shape your daily life and the region's future.`);
  else
    parts.push(`From your perspective as a ${u.city} resident, ${u.school} grad, and ${u.role}, this story connects to the civic and economic dynamics you navigate daily.`);

  // Extra interest hooks
  const extras = (u.extraInterests || "").split(",").map(s => s.trim().toLowerCase()).filter(Boolean);
  const matchedExtras = extras.filter(interest => text.includes(interest));
  if (matchedExtras.length > 0) {
    parts.push(`\n\nThis also connects to your interest in ${matchedExtras.join(" and ")} — an area you follow closely.`);
  }

  return parts.join(" ");
}

function generateConservativeAnalysis(title, snippet, topic) {
  const text = (title + " " + (snippet || "")).toLowerCase();
  const parts = [];

  if (topic.tag.includes("Trump") || topic.tag.includes("MAGA")) {
    parts.push("America First principles focus on putting American citizens and American prosperity first. This policy reflects that commitment — prioritizing Main Street over Wall Street, American workers over global interests, and local control over centralized bureaucracy.");
    parts.push("\n\nThe question to ask: Does this support or hinder American sovereignty, American jobs, and American security? Every policy should be measured against these three metrics.");
  } else if (topic.tag.includes("Real Estate") || topic.tag.includes("Housing")) {
    parts.push("Housing markets thrive when government gets out of the way. Reduce regulatory barriers, streamline permitting, let the market build to demand, and stop imposing price controls that reduce supply. This is how you create affordable housing.");
    parts.push("\n\nGood policy supports builders, encourages investment, protects property rights, and trusts markets more than bureaucrats. Arizona's real estate success comes from relative freedom — protect that advantage.");
  } else if (topic.tag.includes("Arizona") || topic.tag.includes("Conservative")) {
    parts.push("Arizona politics are shaped by liberty-minded residents who value independence, fiscal responsibility, and local control. The America First movement is particularly strong in Arizona because Arizonans understand that Washington doesn't solve Arizona problems.");
    parts.push("\n\nThe conservative principle: decisions should be made as close to home as possible. Phoenix/Scottsdale should lead Maricopa County. Arizona should lead Washington. That's good government.");
  } else if (topic.tag.includes("Education")) {
    parts.push("Schools should teach core academics — reading, math, science, history. Every other agenda should take a backseat. With a school like ASU setting the standard, Arizona universities should focus on producing graduates who can think, work, and compete globally.");
    parts.push("\n\nInternship and career opportunities should flow from strong fundamentals. Arizona students deserve employers who recognize their quality and hire aggressively.");
  } else if (topic.tag.includes("RV") || topic.tag.includes("Motorhome")) {
    parts.push("RV living represents American freedom — the ability to own your home, travel where you want, and live life on your terms. Policy should protect this lifestyle: reasonable campground regulations, infrastructure investment, and respect for private property rights.");
    parts.push("\n\nThe conservative case for supporting RV culture is straightforward: it's about personal freedom, entrepreneurial lifestyles, and the American dream of mobility and independence.");
  } else if (topic.tag.includes("Sports Cards")) {
    parts.push("Sports card collecting and grading represent a legitimate hobby and investment market. Fair valuation, transparent grading standards, and market-driven pricing create healthy ecosystems for collectors.");
    parts.push("\n\nGovernment has no business regulating hobby markets or imposing restrictions on private collectibles. Let the market work, let competition improve quality, and let collectors enjoy their passion.");
  } else {
    parts.push("The America First framework asks: Does this policy put Americans first? Does it respect property rights and personal freedom? Does it strengthen our community? Does it support American prosperity?");
    parts.push("\n\nApply these principles and you'll find the answer most Americans already know.");
  }

  return parts.join("");
}

// ── RSS FEED FETCHING via rss2json.com (free, CORS-friendly, no proxy needed) ──
const RSS_FEEDS = DEFAULT_FEED_QUERIES.map(buildFeedUrl);

function extractSource(title) {
  const match = title.match(/\s+-\s+(.+)$/);
  return match ? match[1].trim() : "Google News";
}

function cleanTitle(title) {
  return title.replace(/\s+-\s+[^-]+$/, "").trim();
}

function extractDesc(html) {
  if (!html) return "";
  const div = document.createElement("div");
  div.innerHTML = html;
  const text = div.textContent.trim();
  return cleanTitle(text).slice(0, 300);
}

async function fetchFeed(rssUrl) {
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
  try {
    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) return [];
    const data = await res.json();
    if (data.status !== "ok" || !data.items) return [];
    return data.items.map(item => ({
      title: cleanTitle(item.title || ""),
      link: item.link || "",
      desc: extractDesc(item.description || item.content || ""),
      pubDate: new Date(item.pubDate || Date.now()),
      source: extractSource(item.title || ""),
    }));
  } catch(e) {
    console.warn("Feed fetch failed:", rssUrl, e);
    return [];
  }
}

async function fetchAllFeeds() {
  const results = await Promise.allSettled(RSS_FEEDS.map(url => fetchFeed(url)));
  const all = results.flatMap(r => r.status === "fulfilled" ? r.value : []);
  const seen = new Set();
  const unique = all.filter(item => {
    if (!item.title) return false;
    const key = item.title.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 40);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  unique.sort((a, b) => b.pubDate - a.pubDate);
  return unique.slice(0, 30);
}

function rssToStory(item, id) {
  const topic = classifyStory(item.title, item.desc);
  const hoursAgo = Math.max(0.5, (Date.now() - item.pubDate.getTime()) / 3600000);
  return {
    id,
    title: item.title.replace(/ - [^-]+$/, "").trim(),
    domain: item.source,
    url: item.link,
    tag: topic.tag,
    icon: topic.icon,
    points: Math.floor(Math.random() * 400 + 100),
    user: item.source.replace(/\.(com|org|net|gov|io|edu)$/i, "").replace(/[^a-zA-Z]/g, ""),
    time: hoursAgo,
    commentCount: Math.floor(Math.random() * 300 + 50),
    summary: item.desc || "Read the full article for details.",
    relevance: generateRelevance(item.title, item.desc, topic),
    conservative: generateConservativeAnalysis(item.title, item.desc, topic),
    sources: [
      { text: "Original reporting", src: item.source },
      { text: "Published " + item.pubDate.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }), src: item.source }
    ],
    isLive: true
  };
}

const timeAgo = (h) => {
  if (h < 1) return `${Math.floor(h * 60)}m ago`;
  if (h < 24) return `${Math.floor(h)}h ago`;
  const d = Math.floor(h / 24);
  return d === 1 ? "yesterday" : `${d}d ago`;
};

  if (!filterKey || filterKey === "All") return true;

const CardGrader = ({ onSaveCard }) => {
  const [playerName, setPlayerName] = useState("");
  const [year, setYear] = useState("");
  const [brand, setBrand] = useState("Topps");
  const [cardNumber, setCardNumber] = useState("");
  const [sport, setSport] = useState("Football");
  const [centering, setCentering] = useState(7);
  const [corners, setCorners] = useState(7);
  const [edges, setEdges] = useState(7);
  const [surface, setSurface] = useState(7);

  const computeGrade = () => {
    const grade = (centering * 0.15 + corners * 0.30 + edges * 0.25 + surface * 0.30);
    return Math.round(grade * 2) / 2; // round to nearest 0.5
  };

  const gradeToLabel = (g) => {
    if (g >= 9.5) return "Gem Mint";
    if (g >= 9) return "Mint";
    if (g >= 8.5) return "NM-MT+";
    if (g >= 8) return "NM-MT";
    if (g >= 7) return "NM";
    if (g >= 6) return "EX-MT";
    if (g >= 5) return "EX";
    if (g >= 4) return "VG-EX";
    if (g >= 3) return "VG";
    if (g >= 2) return "Good";
    return "Poor";
  };

  const gradeToMultiplier = (g) => {
    if (g >= 9.5) return "10-15x";
    if (g >= 9) return "5-10x";
    if (g >= 8) return "2-5x";
    if (g >= 7) return "1-2x";
    return "0.5-1x";
  };

  const computedGrade = computeGrade();
  const label = gradeToLabel(computedGrade);

  const handleSave = () => {
    if (!playerName || !year) {
      alert("Please fill in player name and year");
      return;
    }
    onSaveCard({
      playerName, year, brand, cardNumber, sport,
      centering, corners, edges, surface, grade: computedGrade, label
    });
    setPlayerName("");
    setYear("");
    setCardNumber("");
    setCentering(7);
    setCorners(7);
    setEdges(7);
    setSurface(7);
  };

  return (
    <div style={{ padding: "16px 20px", backgroundColor: C.card }}>
      <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: C.navy }}>Grade a Card</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
        <div>
          <label style={{ fontSize: 11, fontWeight: 600, color: C.navy }}>Player Name *</label>
          <input type="text" value={playerName} onChange={e => setPlayerName(e.target.value)} placeholder="e.g., Tom Brady" style={{
            width: "100%", padding: "6px 8px", fontSize: 12, border: "1px solid #d1d5db", borderRadius: 4, marginTop: 4
          }} />
        </div>
        <div>
          <label style={{ fontSize: 11, fontWeight: 600, color: C.navy }}>Year *</label>
          <input type="text" value={year} onChange={e => setYear(e.target.value)} placeholder="e.g., 2000" style={{
            width: "100%", padding: "6px 8px", fontSize: 12, border: "1px solid #d1d5db", borderRadius: 4, marginTop: 4
          }} />
        </div>
        <div>
          <label style={{ fontSize: 11, fontWeight: 600, color: C.navy }}>Brand</label>
          <select value={brand} onChange={e => setBrand(e.target.value)} style={{
            width: "100%", padding: "6px 8px", fontSize: 12, border: "1px solid #d1d5db", borderRadius: 4, marginTop: 4
          }}>
            <option>Topps</option>
            <option>Panini</option>
            <option>Upper Deck</option>
            <option>Bowman</option>
            <option>Donruss</option>
            <option>Fleer</option>
          </select>
        </div>
        <div>
          <label style={{ fontSize: 11, fontWeight: 600, color: C.navy }}>Card #</label>
          <input type="text" value={cardNumber} onChange={e => setCardNumber(e.target.value)} placeholder="e.g., 1" style={{
            width: "100%", padding: "6px 8px", fontSize: 12, border: "1px solid #d1d5db", borderRadius: 4, marginTop: 4
          }} />
        </div>
        <div>
          <label style={{ fontSize: 11, fontWeight: 600, color: C.navy }}>Sport</label>
          <select value={sport} onChange={e => setSport(e.target.value)} style={{
            width: "100%", padding: "6px 8px", fontSize: 12, border: "1px solid #d1d5db", borderRadius: 4, marginTop: 4
          }}>
            <option>Football</option>
            <option>Baseball</option>
            <option>Basketball</option>
            <option>Hockey</option>
          </select>
        </div>
      </div>

      <div style={{ fontSize: 12, fontWeight: 600, color: C.navy, marginBottom: 12 }}>Condition Assessment</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
        {[
          { label: "Centering", val: centering, set: setCentering, desc: "How well centered is the image?" },
          { label: "Corners", val: corners, set: setCorners, desc: "Sharpness of corners" },
          { label: "Edges", val: edges, set: setEdges, desc: "Condition of edges" },
          { label: "Surface", val: surface, set: setSurface, desc: "Surface quality (no scratches)" }
        ].map(({ label, val, set, desc }) => (
          <div key={label}>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.navy, marginBottom: 4 }}>{label}</div>
            <div style={{ fontSize: 10, color: C.meta, marginBottom: 6 }}>{desc}</div>
            <input type="range" min="0" max="10" step="0.5" value={val} onChange={e => set(parseFloat(e.target.value))} style={{ width: "100%", marginBottom: 4 }} />
            <div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{val} / 10</div>
          </div>
        ))}
      </div>

      <div style={{ padding: "16px", backgroundColor: "#f3f4f6", borderRadius: 6, marginBottom: 16, textAlign: "center" }}>
        <div style={{ fontSize: 11, color: C.meta, marginBottom: 8 }}>Computed Grade (PSA Scale)</div>
        <div style={{ fontSize: 32, fontWeight: 700, color: C.red, marginBottom: 4 }}>{computedGrade}</div>
        <div style={{ fontSize: 14, fontWeight: 600, color: C.navy, marginBottom: 8 }}>{label}</div>
        <div style={{ fontSize: 11, color: C.meta }}>Est. Value Multiplier: {gradeToMultiplier(computedGrade)}</div>
      </div>

      <button onClick={handleSave} style={{
        width: "100%", padding: "10px", backgroundColor: C.green, color: "#fff", border: "none",
        borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: "pointer"
      }}>Save to Collection</button>
    </div>
  );
};

window.__App = function AmericaFirstNewsLive() {
  const [view, setView] = useState({ type: "home" });
  const [liveStories, setLiveStories] = useState([]);
  const [loading, setLoading] = useState(true);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [activeFilter, setActiveFilter] = useState("All");
  const [profile, setProfile] = useState(() => loadProfile());
  const [showEditor, setShowEditor] = useState(false);
  const [showFeedEditor, setShowFeedEditor] = useState(false);
  const [feedVersion, setFeedVersion] = useState(0);

  // Build dynamic feed list from profile's feedQueries + extraFeeds
  const feedUrls = useMemo(() => {
    const queries = (profile.feedQueries || DEFAULT_FEED_QUERIES.join("\n")).split("\n").filter(Boolean);
    const base = queries.map(buildFeedUrl);
    const extra = (profile.extraFeeds || "").split(",").map(s => s.trim()).filter(Boolean);
    extra.forEach(term => {
      base.push(buildFeedUrl(term));
    });
    return base;
  }, [profile.feedQueries, profile.extraFeeds, feedVersion]);

  useEffect(() => {
    setLoading(true);
    Promise.allSettled(feedUrls.map(url => fetchFeed(url))).then(results => {
      const all = results.flatMap(r => r.status === "fulfilled" ? r.value : []);
      const seen = new Set();
      const unique = all.filter(item => {
        if (!item.title) return false;
        const key = item.title.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 40);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      unique.sort((a, b) => b.pubDate - a.pubDate);
      const stories = unique.slice(0, 40).map((item, i) => rssToStory(item, 1000 + i));
      setLiveStories(stories);
      setLastRefresh(new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }));
      setLoading(false);
    }).catch(() => {
      setLoading(false);
      setLastRefresh("feeds unavailable — showing featured stories");
    });
  }, [feedUrls]);

  const handleSaveProfile = useCallback((newProfile) => {
    USER = { ...newProfile };
    setProfile(newProfile);
    saveProfile(newProfile);
    setShowEditor(false);
    setShowFeedEditor(false);
    setFeedVersion(v => v + 1);
  }, []);

  const allStories = useMemo(() => {
    const combined = [];
    const feat = [...FEATURED];
    const live = [...liveStories];
    if (feat.length > 0) combined.push(feat.shift());
    while (live.length > 0 || feat.length > 0) {
      for (let i = 0; i < 3 && live.length > 0; i++) combined.push(live.shift());
      if (feat.length > 0) combined.push(feat.shift());
    }
    return combined;
  }, [liveStories]);

  const filteredStories = useMemo(() => {
    if (!activeFilter || activeFilter === "All") return allStories;
    return allStories.filter(s => storyMatchesFilter(s, activeFilter));
  }, [allStories, activeFilter]);

  const goHome = useCallback(() => { setView({ type: "home" }); window.scrollTo(0, 0); }, []);
  const openStory = useCallback((id) => { setView({ type: "thread", storyId: id }); window.scrollTo(0, 0); }, []);
  const handleFilter = useCallback((f) => { setActiveFilter(f); setView({ type: "home" }); window.scrollTo(0, 0); }, []);
  const goCards = useCallback(() => { setView({ type: "cards" }); window.scrollTo(0, 0); }, []);
  const activeStory = view.type === "thread" ? allStories.find(s => s.id === view.storyId) : null;

  return (
    <div style={{ backgroundColor: C.bg, maxWidth: 900, margin: "0 auto", minHeight: "100vh", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
      <Header onHome={goHome} lastRefresh={lastRefresh} activeFilter={activeFilter} onFilter={handleFilter} onEditFeeds={() => { setShowFeedEditor(e => !e); setShowEditor(false); }} feedEditorOpen={showFeedEditor} onCards={goCards} cardsActive={view.type === "cards"} />
      <WelcomeBanner />
      {view.type === "cards" ? (
        <div>
          <CardDashboard profile={profile} onSaveProfile={handleSaveProfile} />
          <Footer />
        </div>
      ) : view.type === "home" ? (
        <div>
          <div style={{ margin: "10px 16px", padding: "10px 14px", backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 6, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 11, color: C.meta }}>
              <span><span style={{ color: C.green }}>✓</span> Sourced claims</span>
              <span><span style={{ color: C.blue }}>■</span> LIVE = Fresh from RSS</span>
              <span><span style={{ color: C.red }}>■</span> FEATURED = Curated</span>
              <span>{liveStories.length} live stories</span>
            </div>
            <button onClick={() => { setShowEditor(e => !e); setShowFeedEditor(false); }} style={{
              padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
              backgroundColor: showEditor ? C.red : "#f1f5f9", color: showEditor ? "#fff" : C.meta,
              border: showEditor ? "none" : "1px solid #d1d5db", borderRadius: 4
            }}>{showEditor ? "Close Editor" : "Customize Profile"}</button>
          </div>
          {showEditor && <ProfileEditor profile={profile} onSave={handleSaveProfile} onClose={() => setShowEditor(false)} />}
          {showFeedEditor && <FeedEditor profile={profile} onSave={handleSaveProfile} onClose={() => setShowFeedEditor(false)} />}
          {activeFilter && activeFilter !== "All" && (
            <div style={{ margin: "0 16px 8px", padding: "8px 14px", backgroundColor: C.navy, borderRadius: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, color: "#fff", fontWeight: 500 }}>
                Showing: <strong style={{ color: C.red }}>{activeFilter}</strong> ({filteredStories.length} {filteredStories.length === 1 ? "story" : "stories"})
              </span>
              <span onClick={() => handleFilter("All")} style={{ fontSize: 11, color: "#94a3b8", cursor: "pointer", textDecoration: "underline" }}>Show all</span>
            </div>
          )}
          {loading ? <LoadingState /> : filteredStories.length > 0 ? filteredStories.map((s, i) => (
            <StoryCard key={s.id} story={s} rank={i + 1} onOpen={openStory} />
          )) : (
            <div style={{ padding: "40px 20px", textAlign: "center", color: C.meta }}>
              <div style={{ fontSize: 14 }}>No stories match "<strong>{activeFilter}</strong>" right now.</div>
              <div onClick={() => handleFilter("All")} style={{ marginTop: 8, fontSize: 13, color: C.blue, cursor: "pointer" }}>Show all stories</div>
            </div>
          )}
          <Footer />
        </div>
      ) : activeStory ? (
        <div>
          <ThreadView story={activeStory} onBack={goHome} />
          <Footer />
        </div>
      ) : (
        <div style={{ padding: 40, textAlign: "center", color: C.meta }}>Story not found. <span onClick={goHome} style={{ color: C.blue, cursor: "pointer" }}>Go back</span></div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(window.__App));
  </script>
</body>
</html>
